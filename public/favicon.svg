<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)" stroke="#4c1d95" stroke-width="2"/>
  
  <!-- Dumbbell icon -->
  <g fill="url(#iconGradient)" stroke="#e2e8f0" stroke-width="1">
    <!-- Left weight -->
    <rect x="15" y="35" width="8" height="30" rx="4"/>
    <rect x="12" y="40" width="14" height="5" rx="2"/>
    <rect x="12" y="55" width="14" height="5" rx="2"/>
    
    <!-- Right weight -->
    <rect x="77" y="35" width="8" height="30" rx="4"/>
    <rect x="74" y="40" width="14" height="5" rx="2"/>
    <rect x="74" y="55" width="14" height="5" rx="2"/>
    
    <!-- Bar -->
    <rect x="26" y="47" width="48" height="6" rx="3"/>
    
    <!-- Grip marks -->
    <rect x="40" y="48.5" width="1" height="3" rx="0.5"/>
    <rect x="43" y="48.5" width="1" height="3" rx="0.5"/>
    <rect x="46" y="48.5" width="1" height="3" rx="0.5"/>
    <rect x="53" y="48.5" width="1" height="3" rx="0.5"/>
    <rect x="56" y="48.5" width="1" height="3" rx="0.5"/>
    <rect x="59" y="48.5" width="1" height="3" rx="0.5"/>
  </g>
  
  <!-- Sparkle effects -->
  <g fill="#fbbf24" opacity="0.8">
    <circle cx="25" cy="25" r="1.5"/>
    <circle cx="75" cy="25" r="1"/>
    <circle cx="80" cy="70" r="1.5"/>
    <circle cx="20" cy="75" r="1"/>
  </g>
</svg>
